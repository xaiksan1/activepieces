version: '3.0'

# Alexandria FORGE — Activepieces deployment
# Port 9030  |  Container prefix: activepieces-*
# Start: docker compose -f docker-compose.yml up -d

services:
  activepieces:
    image: ghcr.io/activepieces/activepieces:0.70.2
    container_name: activepieces
    restart: unless-stopped
    ports:
      - '9030:80'
    depends_on:
      - activepieces-postgres
      - activepieces-redis
    env_file: .env
    volumes:
      - ./cache:/usr/src/app/cache
    networks:
      - activepieces-net

  activepieces-postgres:
    image: 'postgres:14.4'
    container_name: activepieces-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      - 'POSTGRES_DB=${AP_POSTGRES_DATABASE}'
      - 'POSTGRES_PASSWORD=${AP_POSTGRES_PASSWORD}'
      - 'POSTGRES_USER=${AP_POSTGRES_USERNAME}'
    volumes:
      - activepieces-postgres-data:/var/lib/postgresql/data
    networks:
      - activepieces-net

  activepieces-redis:
    image: 'redis:7.0.7'
    container_name: activepieces-redis
    restart: unless-stopped
    volumes:
      - activepieces-redis-data:/data
    networks:
      - activepieces-net

volumes:
  activepieces-postgres-data:
  activepieces-redis-data:

networks:
  activepieces-net:
